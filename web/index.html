<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h3 class="mb-0">My Tasks</h3>
                        <button id="logoutBtn" class="btn btn-sm btn-outline-light d-none">Logout</button>
                    </div>
                    <div class="card-body">
                        
                        <div id="authSection">
                            <h4 class="mb-3">Login</h4>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" id="email" class="form-control" placeholder="name@example.com">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" id="password" class="form-control" placeholder="Enter your password">
                            </div>
                            <button id="loginBtn" class="btn btn-primary w-100">Sign In</button>
                        </div>

                        <div id="taskSection" class="d-none">
                            <div class="input-group mb-4">
                                <input type="text" id="taskTitle" class="form-control" placeholder="What needs to be done?">
                                <button id="addBtn" class="btn btn-success">Add Task</button>
                            </div>
                            <ul id="taskList" class="list-group">
                                </ul>
                        </div>

                    </div>
                </div>
                <p class="text-center mt-3 text-muted small">&copy; 2026 Todo-App Project</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
