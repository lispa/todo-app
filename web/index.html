<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo-App | Professional Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" onclick="showSection('welcome')">🚀 Todo-App</a>
            <div id="nav-user" class="d-none">
                <span id="user-email" class="text-white-50 me-3"></span>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div id="welcome-section" class="container text-center py-5 animate-fade-in">
        <div class="py-5">
            <h1 class="display-4 fw-bold mb-3">Organize your work and life, finally.</h1>
            <p class="lead mb-5 text-secondary">
                A high-performance task manager built with <b>Go</b>, <b>PostgreSQL</b>, and <b>Nginx</b>.<br>
                Deployed automatically to <b>Proxmox</b> via <b>GitHub Actions</b>.
            </p>
            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                <button onclick="showSection('auth', 'signup')" class="btn btn-primary btn-lg px-5 shadow">Get Started</button>
                <button onclick="showSection('auth', 'login')" class="btn btn-outline-dark btn-lg px-5">Sign In</button>
            </div>
        </div>
    </div>

    <div id="auth-section" class="container d-none py-5 animate-fade-in">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-4">
                        <h3 id="auth-title" class="text-center mb-4">Login</h3>
                        <form id="auth-form">
                            <div id="signup-fields" class="d-none">
                                <input type="text" id="first_name" class="form-control mb-3" placeholder="First Name">
                                <input type="text" id="last_name" class="form-control mb-3" placeholder="Last Name">
                            </div>
                            <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
                            <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>
                            <button type="submit" id="auth-submit-btn" class="btn btn-primary w-100 py-2">Continue</button>
                        </form>
                        <p class="text-center mt-3 mb-0">
                            <small id="auth-switch-text" class="text-muted"></small>
                            <a href="#" onclick="toggleAuthMode()" id="auth-switch-link" class="text-decoration-none"></a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="todo-section" class="container d-none py-5 animate-fade-in">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="input-group mb-4 shadow-sm">
                    <input type="text" id="task-title" class="form-control form-control-lg" placeholder="What needs to be done?">
                    <button onclick="createTask()" class="btn btn-success px-4">Add Task</button>
                </div>
                <div id="tasks-list" class="list-group shadow-sm">
                    </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
