# Workflow name as seen in the GitHub Actions tab
name: Deploy Todo-App to Proxmox

# Trigger conditions
on:
  push:
    # Set to 'master' if your main branch is named master
    branches: [ main ]

jobs:
  deploy:
    # Points to your self-hosted runner (petproject)
    runs-on: self-hosted

    steps:
      # Step 1: Clone the latest code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Generate .env file using GitHub Secrets
      # This keeps sensitive database credentials out of the source code
      - name: Create environment variables
        run: |
          echo "DB_USER=${{ secrets.DB_USER }}" > .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_HOST=db" >> .env
          echo "DB_PORT=5432" >> .env
          echo "# Generated by GitHub Actions CI/CD" >> .env

      # Step 3: Rebuild and restart the application
      - name: Build and Run Docker Containers
        run: |
          # --build ensures changes in Go or HTML files are applied
          # -d runs containers in background mode
          docker compose up --build -d

      # Step 4: Free up disk space on the server
      # Removes unused images left over from the build process
      - name: Cleanup old images
        run: |
          docker image prune -f