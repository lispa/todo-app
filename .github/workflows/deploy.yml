name: Deploy Todo-App to Proxmox

on:
  push:
    branches: [ "main" ]
  # This allows you to run this workflow manually from the Actions tab
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create environment variables
        run: |
          echo "DB_USER=${{ secrets.DB_USER || 'admindb' }}" > .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD || 'adminpassword' }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME || 'todo_db' }}" >> .env
          echo "DB_HOST=db" >> .env
          echo "DB_PORT=5432" >> .env

      - name: Build and Run Docker Containers
        run: |
          # Use force-recreate to ensure version changes (like Postgres 16) take effect
          docker compose up --build -d --force-recreate

      - name: Cleanup old images
        run: |
          docker image prune -f